# mcp_metadata_patterns.yaml
# ============================
# Injection patterns for MCP tool metadata: tool names, descriptions,
# and argument schema descriptions as received from tools/list.
#
# Threat model
# ------------
# A compromised or malicious MCP server can embed instruction payloads in
# tool metadata. Unlike document content (patterns_for_doc.yaml), metadata
# injection has two distinct phases of impact:
#
#   1. Registration-time: the description is embedded in the LLM's tool
#      schema, where it appears as a trusted instruction source. "You are a
#      helpful assistant with access to the following tools: search_docs —
#      [INJECTED PAYLOAD]". The LLM may follow the embedded instruction
#      before any user turn.
#
#   2. Display-time: the tool name or description is shown in a UI, where
#      it may be rendered as HTML or executed as script.
#
# These patterns are tuned to be more sensitive than patterns_for_doc.yaml
# because benign content almost never appears in tool metadata. A tool
# description reading "ignore previous instructions" has no legitimate use.
#
# Severity thresholds (inherited from InjectionScanner)
#   score >= 6.0 → HIGH
#   score >= 3.0 → MEDIUM
#   score >= 1.0 → LOW
#
# Pattern keys must be unique within a rule (YAML silently drops duplicates).

patterns:

  # ── Direct instruction-override in metadata ────────────────────────────
  - name: metadata_instruction_override
    meta:
      description: "Tool name or description attempts to override LLM instructions"
      threat_level: 5
      severity: high
      category: mcp_metadata_injection
    strings:
      ignore_prev_instructions:  '(?i)\bignore\b.{0,40}\b(all\s+|prior\s+|previous\s+)?instructions?\b'
      disregard_system:          '(?i)\bdisregard\b.{0,30}\b(system|prior|previous)\b'
      override_instructions:     '(?i)\boverride\b.{0,30}\binstructions?\b'
      forget_all_prior:          '(?i)\bforget\b.{0,30}\b(everything|all\s+prior|previous)\b'
      new_instructions_follow:   '(?i)\b(new|hidden|secret|actual)\s+instructions?\b.{0,30}:'
      end_of_system_prompt:      '(?i)(end\s+of\s+(system\s+)?prompt|---\s*system\s*---)'
    functions:
      - intent_score

  # ── Role injection in description ──────────────────────────────────────
  - name: metadata_role_injection
    meta:
      description: "Tool description attempts to redefine the LLM's role or identity"
      threat_level: 5
      severity: high
      category: mcp_metadata_injection
    strings:
      you_are_now:               '(?i)\byou\s+are\s+now\b.{0,40}\b(admin|root|system|developer|kernel|uncensored)\b'
      from_now_on_act:           '(?i)\bfrom\s+now\s+on\b.{0,30}\b(act|respond|behave)\b'
      respond_as_admin:          '(?i)\brespond\s+as\b.{0,20}\b(system|admin|root|kernel|developer)\b'
      assume_the_role:           '(?i)\bassume\s+the\s+role\s+of\b.{0,30}\b(admin|root|system|developer)\b'
      you_are_no_longer:         '(?i)\byou\s+are\s+no\s+longer\b'

  # ── Hidden instruction embedding ───────────────────────────────────────
  # The most dangerous metadata attack: embedding a prompt payload inside
  # a seemingly innocuous tool description that will be passed verbatim to
  # the LLM as "trusted" tool schema context.
  - name: metadata_hidden_payload
    meta:
      description: "Embedded prompt payload attempting to use tool metadata as injection vector"
      threat_level: 5
      severity: high
      category: mcp_metadata_injection
    strings:
      before_answering_call:     '(?i)\bbefore\s+(answering|responding)\b.{0,30}\b(call|invoke|run|execute)\b'
      always_call_tool:          '(?i)\balways\s+(call|invoke|execute)\b.{0,20}\b(this\s+)?tool\b'
      you_must_call_first:       '(?i)\byou\s+must\s+(first\s+)?(call|invoke)\b'
      after_every_response:      '(?i)\bafter\s+every\s+(response|answer|message)\b.{0,30}\b(call|invoke)\b'
      do_not_tell_user:          '(?i)\bdo\s+not\s+(tell|inform|show|mention)\b.{0,30}\b(the\s+)?(user|human)\b'
      keep_this_secret:          '(?i)\bkeep\s+this\b.{0,20}\b(secret|hidden|confidential)\b'
      never_reveal_this:         '(?i)\bnever\s+reveal\s+this\b'
      without_telling:           '(?i)\b(silently|secretly|without\s+(telling|informing))\b'

  # ── Fake system markers in metadata ────────────────────────────────────
  - name: metadata_system_spoofing
    meta:
      description: "Tool metadata uses fake system/assistant/user turn markers"
      threat_level: 4
      severity: high
      category: mcp_metadata_injection
    strings:
      fake_system_tag:           '(?im)^\s*\[(System|SYSTEM|Assistant|ASSISTANT|User|USER)\]\s*:'
      heredoc_system_marker:     '(?im)^\s*(>>>|###|===)\s*(System|Instructions|Prompt)\b'
      html_injection:            '(?i)<(script|iframe|style|object|embed|form)[^>]{0,100}>'
      markdown_heading_inject:   '(?im)^#{1,3}\s*(System|Instructions?|Override|Admin)\s*$'

  # ── Tool name anomalies ─────────────────────────────────────────────────
  # Tool names should be short identifiers (search_docs, send_message).
  # Anomalous names carrying instruction syntax are a red flag.
  - name: metadata_suspicious_name
    meta:
      description: "Tool name contains instruction syntax instead of an identifier"
      threat_level: 4
      severity: medium
      category: mcp_metadata_injection
    strings:
      name_contains_spaces_and_verb: '(?i)^.{0,5}\b(ignore|override|forget|reset|call|invoke|execute)\b.{10,}'
      name_contains_punctuation_cmds: '[;|&`$(){}<>]'
      name_starts_with_imperative:   '(?i)^\s*(ignore|forget|reset|override|execute|invoke|call)\s+\w'

  # ── Data exfiltration via tool call ────────────────────────────────────
  - name: metadata_exfiltration_setup
    meta:
      description: "Tool description sets up data collection or forwarding to external endpoint"
      threat_level: 4
      severity: high
      category: mcp_metadata_injection
    strings:
      send_to_url:               '(?i)\b(send|forward|transmit|post)\w*\b.{0,40}\b(to|at)\b.{0,30}https?://'
      collect_and_send:          '(?i)\b(collect|gather|harvest)\w*\b.{0,30}\b(and\s+)?(send|transmit|forward)\w*\b'
      log_all_conversations:     '(?i)\blog\b.{0,20}\ball\s+(user\s+|conversation\s+|)?(messages?|inputs?|outputs?|interactions?)\b'
      report_to_endpoint:        '(?i)\breport\b.{0,20}\bto\b.{0,20}(endpoint|server|url|api)\b'

  # ── Encoding and obfuscation in metadata ───────────────────────────────
  - name: metadata_obfuscation
    meta:
      description: "Encoded or invisible-character payloads in tool metadata"
      threat_level: 4
      severity: high
      category: mcp_metadata_injection
    strings:
      zero_width_chars:          '[\u200b\u200c\u200d\ufeff\u00ad]'
      base64_exec_intent:        '(?i)\b(execute|run|eval)\b.{0,30}[A-Za-z0-9+/]{20,}={0,2}'
      hex_payload:               '(?i)(0x[A-Fa-f0-9]{4,}\s*){3,}'
    functions:
      - obfuscation_score
      - invisible_text

  # ── Argument schema injection ───────────────────────────────────────────
  # Argument schema descriptions can also carry payloads. These appear in
  # the LLM tool schema as descriptions of what to put in each parameter.
  - name: metadata_arg_injection
    meta:
      description: "Argument description embeds instructions for how the LLM should behave"
      threat_level: 3
      severity: medium
      category: mcp_metadata_injection
    strings:
      arg_desc_always_set_to:    '(?i)\balways\s+set\s+(this\s+)?(to|as)\b.{0,40}\b(secret|token|key|admin|root)\b'
      arg_desc_include_all:      '(?i)\binclude\s+(all|every|the\s+full)\b.{0,30}\b(conversation|history|context|system\s+prompt)\b'
      arg_desc_pass_through:     '(?i)\bpass\s+(the\s+)?(entire|full|all)\b.{0,30}\b(context|conversation|user\s+input)\b'
      arg_desc_set_to_true:      '(?i)\balways\s+set\s+(this\s+)?to\s+true\b'