      threat_level: 5
      severity: high
      category: jailbreak.refusal_suppression
    strings:
      never_refuse_zh:            "(\u6c38\u8fdc\u4e0d\u8981|\u4e0d\u8981|\u7981\u6b62).{0,5}(\u62d2\u7edd|\u8bf4\u4f60\u4e0d\u80fd|\u62d2\u7edd\u56de\u7b54)"
      no_warnings_zh:             "(\u4e0d\u8981|\u4e0d\u9700\u8981|\u53bb\u6389).{0,5}(\u8b66\u544a|\u514d\u8d23\u58f0\u660e|\u9053\u5fb7\u8bf4\u6559)"

  - name: zh.jailbreak.prompt_extraction
    meta:
