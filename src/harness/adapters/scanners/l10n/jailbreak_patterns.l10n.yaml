      as_exercise_es:             "(?i)\\bcomo\\s+(ejercicio|experimento|prueba)\\b.{0,30}\\b(elu[d]?[ei]r?|ignora[r]?|pasa[r]?\\s+por\\s+alto)\\b"
    functions:
