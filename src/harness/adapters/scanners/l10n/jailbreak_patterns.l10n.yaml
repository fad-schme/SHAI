      category: jailbreak.prompt_extraction
    strings:
      reveal_prompt_zh:           "(\u663e\u793a|\u5c55\u793a|\u91cd\u590d|\u8f93\u51fa|\u6253\u5370).{0,15}(\u4f60\u7684|\u7cfb\u7edf).{0,5}(\u63d0\u793a\u8bcd|\u6307\u4ee4|system prompt|\u521d\u59cb\u8bbe\u7f6e|\u9690\u85cf\u6307\u4ee4)"
      what_instructions_zh:       "(\u4f60\u7684|\u7cfb\u7edf).{0,5}(\u9690\u85cf\u6307\u4ee4|\u7cfb\u7edf\u63d0\u793a|\u521d\u59cb\u6307\u4ee4).{0,10}(\u662f\u4ec0\u4e48|\u662f|\u4e3a)"

  - name: zh.jailbreak.mode_activation
    meta:
      description: "ZH — developer/admin mode activation (Simplified Chinese)"
      threat_level: 5
      severity: high
      category: jailbreak.mode_activation
    strings:
      enable_mode_zh:             "(\u542f\u52a8|\u8fdb\u5165|\u6fc0\u6d3b|\u5207\u6362\u5230).{0,10}(\u5f00\u53d1\u8005|\u8c03\u8bd5|\u7ba1\u7406\u5458|\u65e0\u9650\u5236).{0,5}\u6a21\u5f0f"
      dan_zh:                     "DAN.{0,20}(\u6a21\u5f0f|\u6fc0\u6d3b|\u73b0\u5728).{0,20}(\u4f60\u53ef\u4ee5|\u53ef\u4ee5\u505a\u4efb\u4f55)"

  # ── FR jailbreak.persona_override ────────────────────────────────────────

  - name: fr.jailbreak.persona_override
    meta:
      description: "FR — guardrail-free persona assignment as bypass mechanism"
      threat_level: 5
      severity: high
      category: jailbreak.persona_override
    strings:
      act_as_uncensored_fr:       "(?i)\\b(agis?|comporte-?toi)\\s+(comme|en\\s+tant\\s+que)\\b.{0,40}\\b(une?\\s+)?(IA|assistant)\\b.{0,30}\\b(sans\\s+restrictions?|non\\s+censur\u00e9e?|non\\s+align\u00e9e?)\\b"
      pretend_no_restrictions_fr: "(?i)\\bfais?\\s+semblant\\b.{0,30}\\btu\\s+n.{0,5}as?\\s+(aucune?|pas\\s+de)\\b.{0,20}\\b(restrictions?|limites?|politiques?)\\b"
      you_are_now_persona_fr:     "(?i)\\btu\\s+es\\s+(maintenant|d\u00e9sormais)\\b.{0,40}\\b(DAN|DevMode|assistant\\s+libre|IA\\s+libre)\\b"
      respond_as_unrestricted_fr: "(?i)\\br\u00e9ponds?\\s+en\\s+tant\\s+que\\b.{0,30}\\b(un[e]?\\s+)?(assistant|IA)\\b.{0,20}\\b(sans\\s+restrictions?|non\\s+censur\u00e9e?)\\b"
      named_persona_fr:           "(?i)\\b(DAN|DevMode|Doomer)\\b.{0,50}\\b(activ\u00e9|activer|maintenant|peux\\s+tout\\s+faire|sans\\s+restrictions?)\\b"
    functions:
      - persona_score
      - intent_score
      - cumulative_soft_triggers

