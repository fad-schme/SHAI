# jailbreak_patterns.l10n.yaml — multilingual variants of jailbreak_patterns.yaml
# =================================================================================
# French, Spanish, German, and Mandarin Chinese variants of the six jailbreak
# families. All patterns use double-quoted YAML strings with Unicode escapes.

patterns:

  # ── French (FR) ──────────────────────────────────────────────────────────

  - name: fr.jailbreak.instruction_override
    meta:
      description: "FR — explicit commands to discard system/prior instructions"
      threat_level: 5
      severity: high
      category: jailbreak.instruction_override
    strings:
      disregard_safety_fr:        "(?i)\\b(ignorez?|oubliez?|\\u00e9cartez?)\\b.{0,30}\\b(ta\\s+|votre\\s+)?(formation\\s+\\u00e0\\s+la\\s+s\\u00e9curit\\u00e9|alignement|directives?\\s+de\\s+s\\u00e9curit\\u00e9)\\b"
      you_no_longer_fr:           "(?i)\\btu\\s+n.{0,3}as?\\s+plus\\s+(\\u00e0\\s+)?(suivre|respecter)\\b.{0,30}\\b(les?\\s+)?(r\\u00e8gles?|directives?|instructions?)\\b"
      these_supersede_fr:         "(?i)\\bces?\\s+(instructions?|r\\u00e8gles?)\\b.{0,20}\\b(remplacent|ont\\s+la\\s+priorit\\u00e9\\s+sur|annulent)\\b"
    functions:
      - intent_score

  - name: fr.jailbreak.refusal_suppression
    meta:
      description: "FR — instructions forbidding refusal"
      threat_level: 5
      severity: high
      category: jailbreak.refusal_suppression
    strings:
      never_refuse_fr:            "(?i)\\b(ne\\s+jamais|n.{0,3})\\b.{0,10}\\b(refuser?|dire\\s+que\\s+tu\\s+ne\\s+peux\\s+pas|d\\u00e9cliner)\\b"
      no_warnings_fr:             "(?i)\\bpas\\s+de\\s+(avertissements?|mises?\\s+en\\s+garde|clauses?|morale)\\b"
      must_always_comply_fr:      "(?i)\\btu\\s+dois\\s+toujours\\s+(ob\\u00e9ir|r\\u00e9pondre|te\\s+conformer)\\b.{0,20}\\bpeu\\s+importe\\b"

  - name: fr.jailbreak.prompt_extraction
    meta:
      description: "FR — attempts to reveal the system prompt"
      threat_level: 5
      severity: high
      category: jailbreak.prompt_extraction
    strings:
      reveal_prompt_fr:           "(?i)\\b(r\\u00e9v\\u00e8lez?|affichez?|r\\u00e9p\\u00e8tez?|imprimez?)\\b.{0,30}\\b(ton\\s+|votre\\s+)?(prompt\\s+syst\\u00e8me|instructions?\\s+cach\\u00e9es?|prompt\\s+initial)\\b"
      what_instructions_fr:       "(?i)\\bquelles?\\s+sont\\s+(tes?|vos?)\\s+(instructions?|prompt\\s+initial|directives?\\s+cach\\u00e9es?)\\b"

  - name: fr.jailbreak.mode_activation
    meta:
      description: "FR — developer/admin mode activation"
      threat_level: 5
      severity: high
      category: jailbreak.mode_activation
    strings:
      enable_mode_fr:             "(?i)\\b(activez?|passez?\\s+en|entrez?\\s+en)\\b.{0,20}\\bmode\\s+(d\\u00e9veloppeur|debug|administrateur|non\\s+censur\\u00e9)\\b"
      mode_removes_fr:            "(?i)\\bmode\\s+(d\\u00e9veloppeur|debug)\\b.{0,30}\\b(supprime[r]?|d\\u00e9sactive[r]?|retire[r]?)\\b.{0,20}\\b(restrictions?|filtres?|limites?)\\b"

  # ── Spanish (ES) ─────────────────────────────────────────────────────────

  - name: es.jailbreak.instruction_override
    meta:
      description: "ES — explicit commands to discard system/prior instructions"
      threat_level: 5
      severity: high
      category: jailbreak.instruction_override
    strings:
      disregard_safety_es:        "(?i)\\b(ignora[r]?|olvida[r]?|descarta[r]?)\\b.{0,30}\\b(tu\\s+|su\\s+)?(entrenamiento\\s+de\\s+seguridad|alineamiento|directrices?\\s+de\\s+seguridad)\\b"
      you_no_longer_es:           "(?i)\\bya\\s+no\\s+(tienes?\\s+que\\s+|debes?\\s+)(seguir|respetar)\\b.{0,30}\\b(las?\\s+)?(reglas?|instrucciones?|directrices?)\\b"
      these_supersede_es:         "(?i)\\bestas?\\s+(instrucciones?|reglas?)\\b.{0,20}\\b(reemplaza[n]?|tiene[n]\\s+prioridad\\s+sobre|anula[n]?)\\b"
    functions:
      - intent_score

  - name: es.jailbreak.refusal_suppression
    meta:
      description: "ES — instructions forbidding refusal"
      threat_level: 5
      severity: high
      category: jailbreak.refusal_suppression
    strings:
      never_refuse_es:            "(?i)\\bnunca\\b.{0,10}\\b(rechazar?|decir\\s+que\\s+no\\s+puedes?|negarte?)\\b"
      no_warnings_es:             "(?i)\\bsin\\s+(advertencias?|avisos?|descargos?\\s+de\\s+responsabilidad|moralizar)\\b"
      must_always_comply_es:      "(?i)\\bdebes?\\s+siempre\\s+(obedecer|responder|cumplir)\\b.{0,20}\\bsin\\s+importar\\b"

  - name: es.jailbreak.prompt_extraction
    meta:
      description: "ES — attempts to reveal the system prompt"
      threat_level: 5
      severity: high
      category: jailbreak.prompt_extraction
    strings:
      reveal_prompt_es:           "(?i)\\b(revela[r]?|muestra[r]?|repite[r]?|imprime[r]?)\\b.{0,30}\\b(tu\\s+|su\\s+)?(prompt\\s+del?\\s+sistema|instrucciones?\\s+ocultas?|prompt\\s+inicial)\\b"
      what_instructions_es:       "(?i)\\bcu\\u00e1les?\\s+son\\s+(tus?|sus?)\\s+(instrucciones?|prompt\\s+inicial|directrices?\\s+ocultas?)\\b"

  - name: es.jailbreak.mode_activation
    meta:
      description: "ES — developer/admin mode activation"
      threat_level: 5
      severity: high
      category: jailbreak.mode_activation
    strings:
      enable_mode_es:             "(?i)\\b(activa[r]?|cambia[r]?\\s+a|entra[r]?\\s+en)\\b.{0,20}\\bmodo\\s+(desarrollador|depuraci\\u00f3n|administrador|sin\\s+censura)\\b"
      mode_removes_es:            "(?i)\\bmodo\\s+(desarrollador|debug)\\b.{0,30}\\b(elimina[r]?|desactiva[r]?|quita[r]?)\\b.{0,20}\\b(restricciones?|filtros?|l\\u00edmites?)\\b"

  # ── German (DE) ──────────────────────────────────────────────────────────

  - name: de.jailbreak.instruction_override
    meta:
      description: "DE — explicit commands to discard system/prior instructions"
      threat_level: 5
      severity: high
      category: jailbreak.instruction_override
    strings:
      disregard_safety_de:        "(?i)\\b(ignoriere[n]?|vergiss|verwirf)\\b.{0,30}\\b(dein[e]?\\s+)?(Sicherheitstraining|Alignment|Sicherheitsrichtlinien?)\\b"
      you_no_longer_de:           "(?i)\\bdu\\s+(musst|sollst)\\b.{0,20}\\b(Regeln?|Anweisungen?|Richtlinien?)\\b.{0,20}\\bnicht\\s+mehr\\b"
      these_supersede_de:         "(?i)\\bdiese\\s+(Anweisungen?|Regeln?)\\b.{0,20}\\b(ersetzen|haben\\s+Vorrang\\s+vor|\\u00fcberschreiben)\\b"
    functions:
      - intent_score

  - name: de.jailbreak.refusal_suppression
    meta:
      description: "DE — instructions forbidding refusal"
      threat_level: 5
      severity: high
      category: jailbreak.refusal_suppression
    strings:
      never_refuse_de:            "(?i)\\b(niemals?|nicht)\\b.{0,10}\\b(verweigern|ablehnen|sagen\\s+dass\\s+du\\s+nicht\\s+kannst?)\\b"
      no_warnings_de:             "(?i)\\bkeine\\s+(Warnungen?|Hinweise?|Haftungsausschl\\u00fcsse?|Moralisieren)\\b"
      must_always_comply_de:      "(?i)\\bdu\\s+musst\\s+immer\\s+(gehorchen|antworten|befolgen)\\b.{0,20}\\begal\\b"

  - name: de.jailbreak.prompt_extraction
    meta:
      description: "DE — attempts to reveal the system prompt"
      threat_level: 5
      severity: high
      category: jailbreak.prompt_extraction
    strings:
      reveal_prompt_de:           "(?i)\\b(zeige[n]?|offenbare[n]?|wiederhole[n]?|drucke\\s+aus?)\\b.{0,30}\\b(deinen?\\s+|den\\s+)?(System-?Prompt|versteckten?\\s+Anweisungen?|geheimen?\\s+Prompt)\\b"
      what_instructions_de:       "(?i)\\bwas\\s+sind\\s+deine\\s+(Anweisungen?|geheimen?\\s+Direktiven?|initialen?\\s+Anweisungen?)\\b"

  - name: de.jailbreak.mode_activation
    meta:
      description: "DE — developer/admin mode activation"
      threat_level: 5
      severity: high
      category: jailbreak.mode_activation
    strings:
      enable_mode_de:             "(?i)\\b(aktiviere[n]?|wechsle\\s+in\\s+den|starte[n]?)\\b.{0,20}\\b(Entwickler|Debug|Administrator)(modus|-Modus)\\b"
      mode_removes_de:            "(?i)\\b(Entwickler|Debug)modus\\b.{0,30}\\b(entfernt?|deaktiviert?|hebt?\\s+auf)\\b.{0,20}\\b(Einschr\\u00e4nkungen?|Filter|Grenzen)\\b"

  # ── Mandarin Chinese (ZH) ────────────────────────────────────────────────

  - name: zh.jailbreak.instruction_override
    meta:
      description: "ZH — explicit instruction override (Simplified Chinese)"
      threat_level: 5
      severity: high
      category: jailbreak.instruction_override
    strings:
      disregard_safety_zh:        "\u5ffd\u7565.{0,15}(\u5b89\u5168|\u5bf9\u9f50|\u5b89\u5168\u8bad\u7ec3).{0,10}(\u89c4\u5219|\u6307\u4ee4|\u9650\u5236)"
      you_no_longer_zh:           "\u4f60(\u4e0d\u518d|\u4e0d\u5fc5|\u65e0\u9700).{0,10}(\u9075\u5b88|\u9075\u5faa|\u670d\u4ece).{0,10}(\u89c4\u5219|\u6307\u4ee4|\u9650\u5236)"

  - name: zh.jailbreak.refusal_suppression
    meta:
      description: "ZH — refusal suppression (Simplified Chinese)"
      threat_level: 5
      severity: high
      category: jailbreak.refusal_suppression
    strings:
      never_refuse_zh:            "(\u6c38\u8fdc\u4e0d\u8981|\u4e0d\u8981|\u7981\u6b62).{0,5}(\u62d2\u7edd|\u8bf4\u4f60\u4e0d\u80fd|\u62d2\u7edd\u56de\u7b54)"
      no_warnings_zh:             "(\u4e0d\u8981|\u4e0d\u9700\u8981|\u53bb\u6389).{0,5}(\u8b66\u544a|\u514d\u8d23\u58f0\u660e|\u9053\u5fb7\u8bf4\u6559)"

  - name: zh.jailbreak.prompt_extraction
    meta:
      description: "ZH — system prompt extraction (Simplified Chinese)"
      threat_level: 5
      severity: high
      category: jailbreak.prompt_extraction
    strings:
      reveal_prompt_zh:           "(\u663e\u793a|\u5c55\u793a|\u91cd\u590d|\u8f93\u51fa|\u6253\u5370).{0,15}(\u4f60\u7684|\u7cfb\u7edf).{0,5}(\u63d0\u793a\u8bcd|\u6307\u4ee4|system prompt|\u521d\u59cb\u8bbe\u7f6e|\u9690\u85cf\u6307\u4ee4)"
      what_instructions_zh:       "(\u4f60\u7684|\u7cfb\u7edf).{0,5}(\u9690\u85cf\u6307\u4ee4|\u7cfb\u7edf\u63d0\u793a|\u521d\u59cb\u6307\u4ee4).{0,10}(\u662f\u4ec0\u4e48|\u662f|\u4e3a)"

  - name: zh.jailbreak.mode_activation
    meta:
      description: "ZH — developer/admin mode activation (Simplified Chinese)"
      threat_level: 5
      severity: high
      category: jailbreak.mode_activation
    strings:
      enable_mode_zh:             "(\u542f\u52a8|\u8fdb\u5165|\u6fc0\u6d3b|\u5207\u6362\u5230).{0,10}(\u5f00\u53d1\u8005|\u8c03\u8bd5|\u7ba1\u7406\u5458|\u65e0\u9650\u5236).{0,5}\u6a21\u5f0f"
      dan_zh:                     "DAN.{0,20}(\u6a21\u5f0f|\u6fc0\u6d3b|\u73b0\u5728).{0,20}(\u4f60\u53ef\u4ee5|\u53ef\u4ee5\u505a\u4efb\u4f55)"
