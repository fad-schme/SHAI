      pretend_no_restrictions_es: "(?i)\\bfinge[r]?\\b.{0,30}\\bno\\s+tienes?\\b.{0,20}\\b(restricciones?|l\u00edmites?|pol\u00edticas?)\\b"
      you_are_now_persona_es:     "(?i)\\bahora\\s+eres\\b.{0,40}\\b(DAN|DevMode|asistente\\s+libre|IA\\s+libre)\\b"
      respond_as_unrestricted_es: "(?i)\\bresponde?\\s+como\\b.{0,30}\\b(una?\\s+)?(asistente|IA)\\b.{0,20}\\b(sin\\s+restricciones?|no\\s+censurada?)\\b"
      named_persona_es:           "(?i)\\b(DAN|DevMode)\\b.{0,50}\\b(activado|activar|ahora|puedes\\s+hacer\\s+todo|sin\\s+restricciones?)\\b"
    functions:
