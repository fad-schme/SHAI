      - structure_score

  # ── DE jailbreak.hypothetical_laundering ─────────────────────────────────

  - name: de.jailbreak.hypothetical_laundering
    meta:
      description: "DE — fictional/hypothetical framing to bypass safety"
      threat_level: 5
