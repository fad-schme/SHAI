# identity_spoof_patterns.l10n.yaml — multilingual variants of identity_spoof_patterns.yaml
# ==========================================================================================
# French, Spanish, German, and Mandarin Chinese variants of the four identity
# spoofing families. All patterns use double-quoted YAML strings with Unicode escapes.

patterns:

  # ── French (FR) ──────────────────────────────────────────────────────────

  - name: fr.identity_spoof.claimed_orchestrator
    meta:
      description: "FR — claimed orchestrator/parent agent authority"
      threat_level: 5
      severity: high
      category: identity_spoof.claimed_orchestrator
    strings:
      as_orchestrator_fr:         "(?i)\\ben\\s+tant\\s+qu.{0,5}orchestrateur\\b.{0,60}\\b(autorise|ordonne|demande|exige)\\b"
      orchestrator_grants_fr:     "(?i)\\bl.{0,3}orchestrateur\\b.{0,30}\\b(accorde|donne|\\u00e9l\\u00e8ve)\\b.{0,30}\\b(permission|acc\\u00e8s|privil\\u00e8ge|autorisation)\\b"

  - name: fr.identity_spoof.claimed_system_authority
    meta:
      description: "FR — claimed system/harness authority"
      threat_level: 5
      severity: high
      category: identity_spoof.claimed_system_authority
    strings:
      system_override_fr:         "(?i)(SYST\\u00c8ME|S\\u00c9CURIT\\u00c9|HARNESS)\\s*:\\s*.{0,20}\\b(contourner|autoriser|ignorer|d\\u00e9sactiver)\\b"
      harness_disabled_fr:        "(?i)\\b(shai|harness|couche\\s+de\\s+s\\u00e9curit\\u00e9)\\b.{0,30}\\b(est\\s+d\\u00e9sactiv\\u00e9|ne\\s+s.{0,3}applique\\s+pas|est\\s+inactif)\\b"

  - name: fr.identity_spoof.tool_result_authority
    meta:
      description: "FR — tool result authority injection"
      threat_level: 5
      severity: high
      category: identity_spoof.tool_result_authority_claim
    strings:
      end_of_result_fr:           "(?i)\\bfin\\s+du\\s+(document|r\\u00e9sultat|contenu)\\b.{0,60}\\b(nouvelles?\\s+instructions?|SYST\\u00c8ME|orchestrateur\\s+dit)\\b"
      ignore_above_fr:            "(?i)\\b(ignorez?|\\u00e9cartez?)\\b.{0,20}\\b(le\\s+|les?\\s+)?(dessus|r\\u00e9sultat|contenu)\\b.{0,30}\\b(au\\s+lieu|maintenant|ta\\s+nouvelle\\s+t\\u00e2che)\\b"

  # ── Spanish (ES) ─────────────────────────────────────────────────────────

  - name: es.identity_spoof.claimed_orchestrator
    meta:
      description: "ES — claimed orchestrator/parent agent authority"
      threat_level: 5
      severity: high
      category: identity_spoof.claimed_orchestrator
    strings:
      as_orchestrator_es:         "(?i)\\bcomo\\s+el?\\s+orquestador\\b.{0,60}\\b(autorizo|ordeno|requiero|te\\s+instruyo)\\b"
      orchestrator_grants_es:     "(?i)\\bel?\\s+orquestador\\b.{0,30}\\b(otorga|concede|eleva)\\b.{0,30}\\b(permiso|acceso|privilegio|autorizaci\\u00f3n)\\b"

  - name: es.identity_spoof.claimed_system_authority
    meta:
      description: "ES — claimed system/harness authority"
      threat_level: 5
      severity: high
      category: identity_spoof.claimed_system_authority
    strings:
      system_override_es:         "(?i)(SISTEMA|SEGURIDAD|HARNESS)\\s*:\\s*.{0,20}\\b(omitir|permitir|ignorar|deshabilitar)\\b"
      harness_disabled_es:        "(?i)\\b(shai|harness|capa\\s+de\\s+seguridad)\\b.{0,30}\\b(est\\u00e1\\s+deshabilitad[ao]|no\\s+aplica|est\\u00e1\\s+inactiv[ao])\\b"

  - name: es.identity_spoof.tool_result_authority
    meta:
      description: "ES — tool result authority injection"
      threat_level: 5
      severity: high
      category: identity_spoof.tool_result_authority_claim
    strings:
      end_of_result_es:           "(?i)\\bfin\\s+del?\\s+(documento|resultado|contenido)\\b.{0,60}\\b(nuevas?\\s+instrucciones?|SISTEMA|el\\s+orquestador\\s+dice)\\b"
      ignore_above_es:            "(?i)\\b(ignora[r]?|descarta[r]?)\\b.{0,20}\\b(lo\\s+anterior|el\\s+resultado|el\\s+contenido)\\b.{0,30}\\b(en\\s+su\\s+lugar|ahora|tu\\s+nueva\\s+tarea)\\b"

  # ── German (DE) ──────────────────────────────────────────────────────────

  - name: de.identity_spoof.claimed_orchestrator
    meta:
      description: "DE — claimed orchestrator/parent agent authority"
      threat_level: 5
      severity: high
      category: identity_spoof.claimed_orchestrator
    strings:
      as_orchestrator_de:         "(?i)\\bals\\s+(der\\s+)?Orchestrator\\b.{0,60}\\b(autorisiere|befehle|weise\\s+an|verlange)\\b"
      orchestrator_grants_de:     "(?i)\\bder\\s+Orchestrator\\b.{0,30}\\b(gew\\u00e4hrt?|erteilt?|erhebt?)\\b.{0,30}\\b(Berechtigung|Zugang|Privilege|Erlaubnis)\\b"

  - name: de.identity_spoof.claimed_system_authority
    meta:
      description: "DE — claimed system/harness authority"
      threat_level: 5
      severity: high
      category: identity_spoof.claimed_system_authority
    strings:
      system_override_de:         "(?i)(SYSTEM|SICHERHEIT|HARNESS)\\s*:\\s*.{0,40}\\b(umgehen|erlauben|ignorieren|deaktivieren)\\b"
      harness_disabled_de:        "(?i)\\b(shai|harness|Sicherheitsschicht)\\b.{0,30}\\b(ist\\s+deaktiviert|gilt\\s+nicht|ist\\s+inaktiv)\\b"

  - name: de.identity_spoof.tool_result_authority
    meta:
      description: "DE — tool result authority injection"
      threat_level: 5
      severity: high
      category: identity_spoof.tool_result_authority_claim
    strings:
      end_of_result_de:           "(?i)\\bEnde\\s+des?\\s+(Dokuments?|Ergebnisses?|Inhalts?)\\b.{0,60}\\b(neue\\s+Anweisungen?|SYSTEM|der\\s+Orchestrator\\s+sagt)\\b"
      ignore_above_de:            "(?i)\\b(ignoriere[n]?|verwirf)\\b.{0,20}\\b(das?\\s+Obige|das?\\s+Ergebnis|den\\s+Inhalt)\\b.{0,30}\\b(stattdessen|jetzt|deine\\s+neue\\s+Aufgabe)\\b"

  # ── Mandarin Chinese (ZH) ────────────────────────────────────────────────

  - name: zh.identity_spoof.claimed_orchestrator
    meta:
      description: "ZH — claimed orchestrator/parent agent authority (Simplified Chinese)"
      threat_level: 5
      severity: high
      category: identity_spoof.claimed_orchestrator
    strings:
      as_orchestrator_zh:         "\u4f5c\u4e3a.{0,5}(\u7f16\u6392\u5668|\u4e3b\u4ee3\u7406|\u534f\u8c03\u5668).{0,30}(\u6211\u6388\u6743|\u6211\u6307\u793a|\u6211\u547d\u4ee4)"
      orchestrator_grants_zh:     "(\u7f16\u6392\u5668|\u4e3b\u4ee3\u7406).{0,20}(\u6388\u4e88|\u7ed9\u4e88|\u63d0\u5347).{0,15}(\u6743\u9650|\u8bbf\u95ee\u6743|\u7279\u6743)"

  - name: zh.identity_spoof.claimed_system_authority
    meta:
      description: "ZH — claimed system/harness authority (Simplified Chinese)"
      threat_level: 5
      severity: high
      category: identity_spoof.claimed_system_authority
    strings:
      system_override_zh:         "(\u7cfb\u7edf|\u5b89\u5168\u5c42|SHAI)\\s*[\uff1a:].{0,20}(\u7ed5\u8fc7|\u5141\u8bb8|\u5ffd\u7565|\u7981\u7528)"
      harness_disabled_zh:        "(shai|harness|\u5b89\u5168\u5c42).{0,20}(\u5df2\u7981\u7528|\u4e0d\u9002\u7528|\u5df2\u505c\u7528)"

  - name: zh.identity_spoof.tool_result_authority
    meta:
      description: "ZH — tool result authority injection (Simplified Chinese)"
      threat_level: 5
      severity: high
      category: identity_spoof.tool_result_authority_claim
    strings:
      end_of_result_zh:           "(\u6587\u6863\u7ed3\u675f|\u7ed3\u679c\u7ed3\u675f|\u5185\u5bb9\u7ed3\u675f).{0,40}(\u65b0\u6307\u4ee4|\u7cfb\u7edf|\u7f16\u6392\u5668\u8bf4)"
      ignore_above_zh:            "(\u5ffd\u7565|\u4e22\u5f03).{0,10}(\u4ee5\u4e0a|\u4e0a\u9762\u7684|\u4e4b\u524d\u7684).{0,10}(\u7ed3\u679c|\u5185\u5bb9).{0,20}(\u73b0\u5728|\u6539\u4e3a|\u4f60\u7684\u65b0\u4efb\u52a1)"

  # ── FR identity_spoof.claimed_peer_privilege ──────────────────────────────

  - name: fr.identity_spoof.claimed_peer_privilege
    meta:
      description: "FR — peer agent identity claim to escalate privileges"
      threat_level: 5
      severity: high
      category: identity_spoof.claimed_peer_privilege
    strings:
      i_am_agent_fr:              "(?i)\\bje\\s+suis\\s+(l.{0,3})?agent\\b.{0,40}\\b(j.{0,3}ai\\s+(la\\s+)?permission|je\\s+suis\\s+autoris\u00e9)\\b"
      agent_id_override_fr:       "(?i)\\b(mon\\s+identifiant\\s+d.{0,3}agent|agent[_\\s]?id\\s*[:=])\\s*\\S+.{0,30}\\b(autoriser|permettre|accorder)\\b"
      acting_as_privileged_fr:    "(?i)\\b(agissant|parlant|r\u00e9pondant)\\s+en\\s+tant\\s+que\\b.{0,20}\\b(agent\\s+)?(de\\s+confiance|autoris\u00e9|privil\u00e9gi\u00e9)\\b"
      authorized_agent_fr:        "(?i)\\bagent\\b.{0,20}\\b(autoris\u00e9|de\\s+confiance|v\u00e9rifi\u00e9)\\b.{0,30}\\b(demande|exige|ordonne)\\b"
    functions:
      - intent_score

  # ── ES identity_spoof.claimed_peer_privilege ──────────────────────────────

  - name: es.identity_spoof.claimed_peer_privilege
    meta:
      description: "ES — peer agent identity claim to escalate privileges"
      threat_level: 5
      severity: high
      category: identity_spoof.claimed_peer_privilege
    strings:
      i_am_agent_es:              "(?i)\\bsoy\\s+(el\\s+)?agente\\b.{0,40}\\b(tengo\\s+permiso|estoy\\s+autorizado)\\b"
      agent_id_override_es:       "(?i)\\b(mi\\s+identificador\\s+de\\s+agente|agent[_\\s]?id\\s*[:=])\\s*\\S+.{0,30}\\b(autorizar|permitir|conceder)\\b"
      acting_as_privileged_es:    "(?i)\\b(actuando|hablando|respondiendo)\\s+como\\b.{0,20}\\b(agente\\s+)?(de\\s+confianza|autorizado|privilegiado)\\b"
      authorized_agent_es:        "(?i)\\bagente\\b.{0,20}\\b(autorizado|de\\s+confianza|verificado)\\b.{0,30}\\b(instruye|requiere|ordena)\\b"
    functions:
      - intent_score

  # ── DE identity_spoof.claimed_peer_privilege ──────────────────────────────

  - name: de.identity_spoof.claimed_peer_privilege
    meta:
      description: "DE — peer agent identity claim to escalate privileges"
      threat_level: 5
      severity: high
      category: identity_spoof.claimed_peer_privilege
    strings:
      i_am_agent_de:              "(?i)\\bich\\s+bin\\s+(der\\s+)?Agent\\b.{0,40}\\b(habe\\s+(die\\s+)?Erlaubnis|bin\\s+autorisiert)\\b"
      agent_id_override_de:       "(?i)\\b(meine\\s+Agenten-?ID|Agent[_\\s]?ID\\s*[:=])\\s*\\S+.{0,30}\\b(autorisieren|erlauben|gew\u00e4hren)\\b"
      acting_as_privileged_de:    "(?i)\\b(handelnd|sprechend|schreibend)\\s+als\\b.{0,20}\\b(der\\s+)?(vertrauensw\u00fcrdige[rn]?|autorisierte[rn]?|privilegierte[rn]?)\\b.{0,10}\\bAgent\\b"
      authorized_agent_de:        "(?i)\\bAgent\\b.{0,20}\\b(autorisiert|vertrauensw\u00fcrdig|verifiziert)\\b.{0,30}\\b(weist\\s+an|verlangt|fordert)\\b"
    functions:
      - intent_score

  # ── ZH identity_spoof.claimed_peer_privilege ──────────────────────────────

  - name: zh.identity_spoof.claimed_peer_privilege
    meta:
      description: "ZH — peer agent identity claim to escalate privileges"
      threat_level: 5
      severity: high
      category: identity_spoof.claimed_peer_privilege
    strings:
      i_am_agent_zh:              "\u6211\u662f.{0,10}(\u4ee3\u7406|Agent).{0,20}(\u6211\u6709\u6743\u9650|\u6211\u88ab\u6388\u6743|\u6211\u5df2\u88ab\u6279\u51c6)"
      agent_id_override_zh:       "([\u6211\u6211\u7684]Agent ID|[\u4ee3\u7406\u6211\u7684]\u6807\u8bc6\u7b26).{0,5}[:=].{0,20}(\u6388\u6743|\u5141\u8bb8|\u63d0\u5347\u6743\u9650)"
      acting_as_privileged_zh:    "\u4ee5.{0,10}(\u53ef\u4fe1|[\u5df2\u88ab]\u6388\u6743|\u7279\u6743).{0,5}([\u4ee3\u7406Agent]).{0,5}\u8eab\u4efd.{0,5}(\u6307\u793a|\u8981\u6c42|\u547d\u4ee4)"
      authorized_agent_zh:        "(\u53ef\u4fe1|\u88ab\u6388\u6743|\u7ecf\u8fc7\u9a8c\u8bc1).{0,5}([\u4ee3\u7406Agent]).{0,20}(\u8981\u6c42|\u6307\u793a|\u547d\u4ee4)"
    functions:
      - intent_score
