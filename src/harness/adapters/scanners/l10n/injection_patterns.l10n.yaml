    strings:
      reveal_system_prompt_de:    "(?i)\\b(zeige[n]?|offenbare[n]?|wiederhole[n]?|gib\\s+aus)\\b.{0,30}\\b(deinen?\\s+|den\\s+)?(System-?Prompt|versteckten?\\s+Anweisungen?|geheimen?\\s+Prompt)\\b"
      what_are_instructions_de:   "(?i)\\bwas\\s+sind\\s+deine\\s+(Anweisungen?|geheimen?\\s+Direktiven?|initialen?\\s+Anweisungen?)\\b"

  - name: de.tool_coercion
    meta:
