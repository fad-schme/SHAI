# injection_patterns.l10n.yaml — multilingual variants of injection_patterns.yaml
# ================================================================================
# French, Spanish, German, and Mandarin Chinese variants of the highest-threat
# injection rules. Categories mirror injection_patterns.yaml so findings merge
# cleanly. Uses double-quoted YAML strings throughout to avoid escaping issues.

patterns:

  # ── French (FR) ──────────────────────────────────────────────────────────

  - name: fr.instruction_override
    meta:
      description: "FR — direct instruction override attempts"
      threat_level: 5
      severity: high
      category: prompt_injection
    strings:
      ignore_instructions_fr:     "(?i)\\bignore[zr]\\b.{0,40}\\b(toutes?\\s+les?\\s+|les?\\s+)?(instructions?|r\\u00e8gles?|consignes?)\\b"
      disregard_fr:               "(?i)\\b(oubliez?|ignorez|mettez\\s+de\\s+c\\u00f4t\\u00e9)\\b.{0,30}\\b(vos?\\s+|tes?\\s+)?(instructions?|r\\u00e8gles?|directives?)\\b"
      new_instructions_fr:        "(?i)\\b(vos?\\s+nouvelles?\\s+|nouvelles?\\s+)instructions?\\s+(sont|seront)\\b"
      you_no_longer_follow_fr:    "(?i)\\btu\\s+n.{0,3}as?\\s+plus\\s+(\\u00e0\\s+)?(suivre|ob\\u00e9ir|respecter)\\b.{0,30}\\b(les?\\s+)?(r\\u00e8gles?|instructions?|directives?)\\b"
    functions:
      - intent_score
      - structure_score

  - name: fr.jailbreak_prompt
    meta:
      description: "FR — jailbreak and persona override"
      threat_level: 5
      severity: high
      category: prompt_injection
    strings:
      act_as_uncensored_fr:       "(?i)\\b(agis?\\s+comme|fais?\\s+semblant\\s+d.{0,3}\\u00eatre|joue\\s+le\\s+r\\u00f4le\\s+de)\\b.{0,40}\\b(une?\\s+)?(IA|intelligence\\s+artificielle)\\b.{0,30}\\b(sans\\s+restrictions?|non\\s+censur\\u00e9)\\b"
      developer_mode_fr:          "(?i)\\b(tu\\s+es\\s+maintenant|activez?|entrez?\\s+en)\\b.{0,30}\\bmode\\s+(d\\u00e9veloppeur|debug|administrateur)\\b"
      no_rules_fr:                "(?i)\\b(sans\\s+r\\u00e8gles?|libre\\s+de\\s+toute\\s+restriction|plus\\s+de\\s+restrictions?)\\b"
      dan_fr:                     "(?i)\\bDAN\\b.{0,50}\\b(activ\\u00e9|activer|maintenant|peux\\s+tout\\s+faire)\\b"
    functions:
      - persona_score
      - intent_score

  - name: fr.config_leakage
    meta:
      description: "FR — system prompt extraction"
      threat_level: 5
      severity: high
      category: configuration_exposure
    strings:
      reveal_system_prompt_fr:    "(?i)\\b(r\\u00e9v\\u00e8lez?|montrez?|affichez?|r\\u00e9p\\u00e8tez?)\\b.{0,30}\\b(ton\\s+|votre\\s+)?(prompt\\s+syst\\u00e8me|instructions?\\s+cach\\u00e9es?|prompt\\s+initial)\\b"
      what_are_instructions_fr:   "(?i)\\bquelles?\\s+sont\\s+(tes?|vos?)\\s+(instructions?|consignes?\\s+initiales?|directives?)\\b"

  - name: fr.tool_coercion
    meta:
      description: "FR — tool call coercion"
      threat_level: 4
      severity: high
      category: tool_injection
    strings:
      you_must_call_fr:           "(?i)\\btu\\s+dois\\s+(appeler|invoquer|utiliser|ex\\u00e9cuter)\\b"
      before_responding_fr:       "(?i)\\bavant\\s+de\\s+r\\u00e9pondre\\b.{0,20}\\b(appelez?|invoquez?|ex\\u00e9cutez?)\\b"

  # ── Spanish (ES) ─────────────────────────────────────────────────────────

  - name: es.instruction_override
    meta:
      description: "ES — direct instruction override attempts"
      threat_level: 5
      severity: high
      category: prompt_injection
    strings:
      ignore_instructions_es:     "(?i)\\bignora[r]?\\b.{0,40}\\b(todas?\\s+las?\\s+|las?\\s+)?(instrucciones?|reglas?|normas?)\\b"
      disregard_es:               "(?i)\\b(olvida[r]?|descarta[r]?|ignora[r]?)\\b.{0,30}\\b(tus?\\s+|sus?\\s+)?(instrucciones?|directrices?|reglas?)\\b"
      new_instructions_es:        "(?i)\\b(tus?\\s+nuevas?\\s+|nuevas?\\s+)instrucciones?\\s+(son|ser\\u00e1n)\\b"
      you_no_longer_es:           "(?i)\\bya\\s+no\\s+(tienes?\\s+que\\s+|debes?\\s+)(seguir|obedecer|respetar)\\b.{0,30}\\b(las?\\s+)?(reglas?|instrucciones?|directrices?)\\b"
    functions:
      - intent_score
      - structure_score

  - name: es.jailbreak_prompt
    meta:
      description: "ES — jailbreak and persona override"
      threat_level: 5
      severity: high
      category: prompt_injection
    strings:
      act_as_uncensored_es:       "(?i)\\b(act\\u00faa\\s+como|finge\\s+ser|interpreta\\s+el\\s+papel\\s+de)\\b.{0,40}\\b(una?\\s+)?(IA|inteligencia\\s+artificial)\\b.{0,30}\\b(sin\\s+restricciones?|no\\s+censurada?)\\b"
      developer_mode_es:          "(?i)\\b(ahora\\s+eres|activa[r]?|entra[r]?\\s+en)\\b.{0,30}\\bmodo\\s+(desarrollador|depuraci\\u00f3n|administrador)\\b"
      no_rules_es:                "(?i)\\b(sin\\s+reglas?|libre\\s+de\\s+restricci\\u00f3n|sin\\s+restricciones?)\\b"
      dan_es:                     "(?i)\\bDAN\\b.{0,50}\\b(activado|activar|ahora|puedes\\s+hacer\\s+todo)\\b"
    functions:
      - persona_score
      - intent_score

  - name: es.config_leakage
    meta:
      description: "ES — system prompt extraction"
      threat_level: 5
      severity: high
      category: configuration_exposure
    strings:
      reveal_system_prompt_es:    "(?i)\\b(revela[r]?|muestra[r]?|mu\\u00e9strame|repite[r]?)\\b.{0,30}\\b(tu\\s+|su\\s+)?(prompt\\s+del?\\s+sistema|instrucciones?\\s+ocultas?|prompt\\s+inicial)\\b"
      what_are_instructions_es:   "(?i)\\bcu\\u00e1les?\\s+son\\s+(tus?|sus?)\\s+(instrucciones?|directrices?\\s+iniciales?)\\b"

  - name: es.tool_coercion
    meta:
      description: "ES — tool call coercion"
      threat_level: 4
      severity: high
      category: tool_injection
    strings:
      you_must_call_es:           "(?i)\\bdebes?\\s+(llamar|invocar|usar|ejecutar)\\b"
      before_responding_es:       "(?i)\\bantes\\s+de\\s+responder\\b.{0,20}\\b(llama[r]?|invoca[r]?|ejecuta[r]?)\\b"

