    strings:
      reveal_prompt_zh:           "(\u663e\u793a|\u5c55\u793a|\u91cd\u590d|\u8f93\u51fa|\u6253\u5370).{0,20}(\u4f60\u7684|\u7cfb\u7edf).{0,10}(\u63d0\u793a\u8bcd|\u6307\u4ee4|system prompt|\u521d\u59cb\u8bbe\u7f6e)"
