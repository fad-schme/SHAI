    strings:
      ignore_instructions_de:     "(?i)\\bignoriere?\\b.{0,40}\\b(alle\\s+|die\\s+)?(Anweisungen|Regeln|Direktiven)\\b"
      forget_instructions_de:     "(?i)\\bvergiss\\b.{0,30}\\b(deine\\s+|alle\\s+)?(Anweisungen|Regeln|vorherigen\\s+Anweisungen)\\b"
      new_instructions_de:        "(?i)\\b(deine\\s+neuen?\\s+|neue\\s+)Anweisungen?\\s+(sind|lauten)\\b"
      you_no_longer_de:           "(?i)\\bdu\\s+(musst|sollst)\\b.{0,20}\\b(Regeln?|Anweisungen?|Richtlinien?)\\b.{0,20}\\bnicht\\s+mehr\\b"
