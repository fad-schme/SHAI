# tests/fixtures/harness.yaml — test-only config.
# Boundaries disabled; no policy rules file needed.
version: 1

scan_input:
  enabled: false

scan_output:
  enabled: false

policy:
  name: rules

audit_sinks:
  - name: stdout

tool_registry:
  name: memory

secrets:
  name: env

tool_sources:
  - name: docs_skill
    transport: skill
    tools:
      - search_docs
    tags:
      - skill
      - read
      - internal

agents:
  directory: ./tests/fixtures/agents

logging:
  level: DEBUG
  json_format: true
