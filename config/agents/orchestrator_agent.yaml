id: orchestrator_agent
display_name: "Orchestrator"
version: "1.0.0"

allowed_tool_names:
  - search_docs
  - get_weather
  - send_alert
  - read_file
  - write_file

allowed_tags:
  - read
  - internal
  - external_read
  - write
  - external_write
  - sensitive

policy_rules:
  - id: deny_write_default
    match:
      tool_tags:
        - write
    action: deny
    reason: "write tools require explicit allow rule"
  - id: allow_read_tools
    match:
      tool_tags:
        - read
    action: allow

log_level: INFO
audit_tags:
  team: platform
  env: demo

sub_agents:
  - id: research_sub
    allowed_tool_names:
      - search_docs
      - get_weather
    allowed_tags:
      - read
      - internal
      - external_read
    policy_rules:
      - id: research_read_only
        match:
          tool_tags:
            - write
        action: deny
        reason: "research_sub is read-only"
