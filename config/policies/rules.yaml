# config/policies/rules.yaml
# Global policy rules — applied to every agent after agent-scoped rules.
# Intersection model: first deny anywhere in the chain wins.
# Add rules here to enforce organisation-wide constraints.
# See docs/policy.md for the full rule grammar.

# Example: deny all MCP tool calls by default.
# Remove or adjust for your deployment.
- id: allow_local_tools
  match:
    transport:
      - local
      - skill
  action: allow

- id: deny_mcp_by_default
  match:
    transport:
      - mcp
  action: deny
  reason: "MCP tools require explicit agent-level allow rule"
