# config/harness.yaml — operator config for the examples.
version: 1
tenant_id: "shai-demo"

scan_input:
  enabled: true
  block_at: high
  action: block               # block | alert | redact
  scanners:
    - name: regex_pii
      action: redact          # redact PII instead of blocking
      redact_with: "***"      # placeholder (use {category} for category name)
    - name: injection_scan
      action: block           # always hard-block injection attempts

scan_output:
  enabled: true
  block_at: high
  action: block
  scanners:
    - name: regex_pii
      action: redact
      redact_with: "[REDACTED:{category}]"

scan_tool_result:
  enabled: true
  block_at: high
  action: block

check_tool_call:
  rate_limit:
    enabled: true
    window_seconds: 60
    max_calls_per_window: 30
    max_calls_per_tool: 10
  arg_scanners:
    - name: regex_pii
  scan_args_for_tags:
    - sensitive

policy:
  rules:
    - id: allow_local_tools
      match:
        transport: [local, skill]
      action: allow
    - id: deny_mcp_by_default
      match:
        transport: [mcp]
      action: deny
      reason: "MCP tools require explicit agent-level allow rule"

audit_sinks:
  - name: stdout
