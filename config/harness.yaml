# config/harness.yaml
# Managed by the operator. Edit this file to configure SHAI for your deployment.
# Reference: harness.yaml.example at the repo root for all available options.

version: 1
tenant_id: "my-deployment"  # unique name for this harness instance

scan_input:
  enabled: true
  block_at: high
  scanners:
    - name: regex_pii
    - name: basic_injection

scan_output:
  enabled: true
  block_at: high
  scanners:
    - name: regex_pii

check_tool_call:
  arg_scanners:
    - name: regex_pii
  scan_args_for_tags:
    - sensitive

policy:
  name: rules
  config:
    rules_path: ./config/policies/rules.yaml

audit_sinks:
  - name: stdout

tool_registry:
  name: memory

secrets:
  name: env

tool_sources:
  - name: docs_skill
    transport: skill
    tools:
      - search_docs
      - fetch_doc
    tags:
      - skill
      - read
      - internal

agents:
  directory: ./config/agents

logging:
  level: INFO
  json_format: true
